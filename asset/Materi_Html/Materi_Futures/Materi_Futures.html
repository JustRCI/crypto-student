<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Materi - Futures</title>

    <link rel="stylesheet" href="../style.css">
    
</head>
<body>

    <div class="container">
        <header>
            <h2>Modul Futures</h2>
            <p>Silakan pelajari materi di bawah ini atau unduh untuk akses offline.</p>
        </header>

        <div class="preview-card">
            <iframe 
                src="Materi Futures.pdf#toolbar=0&navpanes=0&scrollbar=0" 
                width="100%" 
                height="600px"></iframe>
        </div>

        <div class="action-area">
            <a href="Materi Futures.pdf" download class="btn-download">
                <span>📥</span> Download Materi (PDF)
            </a>
        </div>
    </div>

</body>
</html>
